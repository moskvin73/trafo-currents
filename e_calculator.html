<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Инженерный калькулятор</title>

    <!-- Подключение конфигурации и автозагрузки MathJax из репозитория -->
    <script src="./js/math-script.js"></script>

    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="./css/floating-menu.css">
	
	<style>

        html {
            /* Современный CSS-способ: резервирует место под скроллбар без принудительного показа бегунка */
            scrollbar-gutter: stable;
            
            /* Запасной классический вариант для старых браузеров (всегда показывает полосу) */
            overflow-y: scroll; 
        }

        /* ==========================================================================
        ГЛОБАЛЬНЫЕ НАСТРОЙКИ И ЦВЕТОВЫЕ ТЕМЫ
        ========================================================================== */

        :root, [data-theme="light"] {
            /* --- СВЕТЛАЯ ТЕМА (По умолчанию) --- */
            --calc-bg-main: #ffffff;           /* Фон самого калькулятора */
            --calc-bg-card: #f8fafc;           /* Фон архивной карточки (светло-серый) */
            --calc-bg-echo: #f1f5f9;           /* Фон блока эхо-кода */
            --calc-bg-input: #ffffff;          /* Фон поля ввода */
            
            --calc-color-text: #0f172a;        /* Основной цвет текста (почти черный) */
            --calc-color-echo: #475569;        /* Цвет текста внутри эхо-кода */
            --calc-color-muted: #94a3b8;       /* Цвет крестика [×] и второстепенного текста */
            --calc-color-border: #cbd5e1;      /* Цвет всех рамок и границ */

            --calc-color-brand: #0f2d59;       /* Ваша фирменная синяя палитра (основной) */
            --calc-color-brand-hover: #1e3a6d; /* Синий при наведении */
            --calc-color-brand-shadow: rgba(15, 45, 89, 0.1); /* Тень вокруг поля при фокусе */
            
            --calc-color-danger: #dc3545;      /* Красный цвет для удаления/ошибок */

            /* Переменная цвета для MathJax в светлой теме (совпадает с основным текстом) */
            --calc-mathjax-color: #0f172a;

            /* --- РАЗМЕРЫ И ОТСТУПЫ --- */

            /* --- Внешние отступы (Margins) --- */
            --calc-main-margin-top: 0px;       /* Отступ всего калькулятора от верхнего контента */
            --calc-card-margin-bottom: 2px;    /* Расстояние между архивными карточками в ленте */
            --calc-echo-margin-bottom: 2px;    /* Отступ снизу от эхо-кода до результата внутри карточки */
            --calc-row-margin-top: 8px;        /* Отступ сверху для строки ввода (отделяет от ленты) */

            /* --- Внутренние отступы (Paddings) --- */
            --calc-card-padding: 6px;          /* Внутренний отступ архивной карточки */
            --calc-echo-padding: 2px 4px;      /* Внутренний отступ для блока с эхо-кодом (верх/низ и право/лево) */
            --calc-input-padding: 4px;         /* Внутренний отступ в поле ввода (высота и простор текста) */
            --calc-result-padding: 2px;
            --calc-btn-padding-desktop: 0 25px;/* Отступы кнопки Enter на ПК (0 сверху/снизу, 25px по бокам) */
            --calc-btn-padding-mobile: 12px;   /* Внутренний отступ кнопки Enter на смартфонах */
            --calc-btn-delete-padding: 2px 6px;/* Область клика вокруг крестика [×] удаления карточки */

            /* --- Размеры шрифтов (Font Sizes) --- */
            --calc-font-size-echo: 14px;       /* Размер шрифта эхо-кода */
            --calc-font-size-input: 14px;      /* Размер шрифта в поле ввода */
            --calc-font-size-result: 14px;     /* Размер шрифта в поле ввода */
            --calc-font-size-btn: 14px;        /* Размер шрифта на кнопке Enter */
            --calc-font-size-delete: 18px;     /* Размер крестика [×] удаления карточки */

            /* --- Скругление углов (Border Radius) --- */
            --calc-radius-card: 4px;           /* Скругление архивной карточки */
            --calc-radius-echo: 6px;           /* Скругление блока эхо-кода */
            --calc-radius-input: 4px;          /* Скругление поля ввода */
            --calc-radius-result: 2px;
            --calc-radius-btn: 4px;            /* Скругление кнопки Enter */

            /* --- Сетки и Позиционирование --- */
            --calc-row-gap: 12px;              /* Расстояние между полем ввода и кнопкой Enter на ПК */
            --calc-btn-delete-top: 10px;       /* Смещение крестика [×] от верхнего края карточки */
            --calc-btn-delete-right: 12px;     /* Смещение крестика [×] от правого края карточки */
            
        }

        /* --- ТЁМНАЯ ТЕМА --- */
        [data-theme="dark"] {
            --calc-bg-main: #0a0f1d;           /* Очень глубокий, почти чёрный фон калькулятора */
            --calc-bg-card: #111827;           /* Фон архивных карточек чуть светлее */
            --calc-bg-echo: #1f2937;           /* Фон блока эхо-кода */
            --calc-bg-input: #111827;          /* Фон поля ввода */
            
            /* Основные цвета текста — теперь ядовито-зелёные */
            --calc-color-text: #39ff14;        /* Кислотно-зелёный (Neon Green) для результатов и текста */
            --calc-color-echo: #a7f3d0;        /* Мягкий бледно-зелёный для читаемости кода */
            --calc-color-muted: #4b5563;       /* Приглушённый цвет для рамок карточек (чтобы не рябило) */
            --calc-color-border: #059669;      /* Тёмно-зелёные границы элементов */

            /* Управляющие кнопки и фокусы */
            --calc-color-brand: #10b981;       /* Изумрудно-зелёный для активных кнопок */
            --calc-color-brand-hover: #34d399; /* Яркий зелёный при наведении */
            --calc-color-brand-shadow: rgba(57, 255, 20, 0.25); /* Неоновое зелёное свечение вокруг поля ввода */
            
            --calc-color-danger: #ef4444;      /* Контрастный красный для удаления */

            /* Самое главное: Принудительный цвет для MathJax формул в тёмной теме */
            --calc-mathjax-color: #39ff14 !important;
        }

        /* ==========================================================================
        СТИЛИ КОМПОНЕНТОВ (Полностью привязаны к переменным)
        ========================================================================== */

        /* Контейнер калькулятора */
        .command-line-calculator {
            margin-top: var(--calc-main-margin-top);
            background: var(--calc-bg-main);
            color: var(--calc-color-text);
            transition: background 0.3s, color 0.3s; /* Плавный переход при смене темы */
        }

        /* Каждая архивная карточка в ленте */
        .calc-card {
            position: relative;
            background: var(--calc-bg-card);
            border: 1px solid var(--calc-color-border);
            border-radius: var(--calc-radius-card);
            padding: var(--calc-card-padding);
            margin-bottom: var(--calc-card-margin-bottom);
            animation: fadeIn 0.3s ease;
            transition: background 0.3s, border-color 0.3s;
        }

        .calc-card-echo {
            /* Все ваши старые свойства без изменений */
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: var(--calc-font-size-echo);
            color: var(--calc-color-echo);
            background: var(--calc-bg-echo);
            padding: var(--calc-echo-padding);
            border-radius: var(--calc-radius-echo);
            display: inline-block;      
            white-space: pre-wrap;      
            word-break: break-word;     
            margin-bottom: var(--calc-echo-margin-bottom);
            border-left: 2px solid var(--calc-color-brand);
            
            /* Добавляем поддержку плавного скрытия */
            max-height: 500px; /* Задаем заведомо большую высоту для анимации */
            opacity: 1;
            overflow: hidden;
            transition: background 0.3s, color 0.3s, border-color 0.3s, 
                        max-height 0.3s ease-in-out, opacity 0.2s ease, margin 0.3s ease;
        }

        /* КЛАСС СКРЫТИЯ ЭХО-БЛОКА (Плавное схлопывание) */
        .calc-card-echo.hidden {
            max-height: 0px;
            opacity: 0;
            margin-bottom: 0px;
            padding-top: 0px;
            padding-bottom: 0px;
            border-left-width: 0px;
        }

        /* ЕДИНЫЙ КОНТЕЙНЕР ДЛЯ КНОПОК УПРАВЛЕНИЯ В КАРТОЧКЕ */
        .calc-card-actions {
            position: absolute;
            top: var(--calc-btn-delete-top);
            right: var(--calc-btn-delete-right);
            display: flex;
            align-items: center; /* Идеальное выравнивание глаза и крестика по горизонтальной оси */
            gap: 12px; /* Фиксированное расстояние между кнопками */
        }

        /* Базовый сброс для обеих кнопок в панели */
        .calc-card-delete,
        .calc-card-toggle-echo {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: var(--calc-btn-delete-padding);
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1; /* Обнуляем высоту строки, чтобы шрифты не смещались вверх/вниз */
        }

        /* Специфичные стили крестика [×] */
        .calc-card-delete {
            color: var(--calc-color-muted);
            font-size: var(--calc-font-size-delete);
            font-weight: bold;
            transition: color 0.2s;
        }
        .calc-card-delete:hover {
            color: var(--calc-color-danger);
        }

        /* Специфичные стили глаза [👁️] */
        .calc-card-toggle-echo {
            color: var(--calc-color-muted);
            font-size: 16px; /* Размер иконки глаза */
            transition: color 0.2s, transform 0.2s;
        }
        .calc-card-toggle-echo:hover {
            color: var(--calc-color-brand);
            transform: scale(1.1);
        }

        /* Контейнер активной строки ввода */
        .input-row-container {
            display: flex;
            gap: var(--calc-row-gap);
            align-items: stretch;
            margin-top: var(--calc-row-margin-top);
        }

        /* ЕДИНЫЙ КОНТЕЙНЕР ТЕРМИНАЛА */
        .terminal-editor-block {
            flex: 1;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--calc-color-border);
            border-radius: var(--calc-radius-input);
            background: var(--calc-bg-input);
            overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        /* Эффект фокуса на всем блоке, когда пользователь внутри textarea */
        .terminal-editor-block:focus-within {
            border-color: var(--calc-color-brand);
            box-shadow: 0 0 0 3px var(--calc-brand-shadow);
        }

        /* РАБОЧАЯ ЗОНА ВВОДА */
        .textarea-with-lines {
            display: flex;
            background: transparent;
            border: none; /* Убираем старую рамку */
        }

        /* БЛОК НОМЕРОВ СТРОК */
        .line-numbers {
            background: var(--calc-bg-card);
            color: var(--calc-color-muted);
            padding: 12px 8px 12px 12px;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: var(--calc-font-size-input);
            line-height: 1.5;
            text-align: right;
            user-select: none;
            border-right: 1px solid var(--calc-color-border);
            min-width: 25px;
        }

        /* ПОЛЕ ВВОДА */
        #calc-terminal-input {
            flex: 1;
            background: transparent !important;
            color: var(--calc-color-text);
            border: none !important;
            box-shadow: none !important;
            padding: 12px;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: var(--calc-font-size-input);
            line-height: 1.5;
            outline: none;
            resize: none;             
            overflow-y: hidden;       
            box-sizing: border-box;   
            field-sizing: content;     
            caret-color: var(--calc-color-text);
        }

        /* СТИЛИ ФИКСИРОВАННОЙ ПАНЕЛИ СТАТУСА */
        .terminal-status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--calc-bg-card);
            border-top: 1px solid var(--calc-color-border);
            padding: 6px 12px;
            user-select: none;
        }

        /* АККУРАТНАЯ КНОПКА ЗАПУСКА В ПАНЕЛИ */
        #calc-submit-btn {
            background: var(--calc-color-brand);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 5px 14px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        #calc-submit-btn:hover { background: var(--calc-color-brand-hover); }
        #calc-submit-btn:active { transform: scale(0.97); }

        /* ИНДИКАТОР КУРСОРA */
        .cursor-position {
            font-family: 'Fira Code', monospace;
            font-size: 12px;
            color: var(--calc-color-echo);
        }

        /* Убираем старую адаптивность медиа-запроса, так как панель теперь всегда строчная и красивая */
        @media (max-width: 768px) {
            .input-row-container { flex-direction: column; }
        }

        #calc-terminal-input:focus {
            border-color: var(--calc-color-brand);
            box-shadow: 0 0 0 3px var(--calc-brand-shadow);
        }

        .result-side {
            flex: 1;
            background: var(--calc-bg-input);
            color: var(--calc-color-text);
            min-width: 300px;
            padding: var(--calc-result-padding);
            border-radius: var(--calc-radius-result);
            border: 1px dashed var(--calc-color-border);
            font-size: var(--calc-font-size-result);
            text-align: center;
        }

        /* Изменение иконки шестеренки на крестик при открытии меню */
        .fab-container.open .fab-main {
            transform: rotate(90deg);
            background-color: #f44336; /* Ваш красный цвет */
        }

        /* КЛЮЧЕВОЙ КЛЮЧ ДЛЯ MATHJAX: Управляем видимостью формул во всех режимах рендеринга */
        .command-line-calculator mjx-container,
        .command-line-calculator .MathJax,
        .command-line-calculator .MathJax_Display,
        .command-line-calculator mjx-math {
            color: var(--calc-mathjax-color) !important;
            fill: var(--calc-mathjax-color) !important; /* Для SVG-рендеринга MathJax */
            transition: color 0.3s ease, fill 0.3s ease;
        }

        /* На всякий случай: если MathJax генерирует SVG-элементы напрямую */
        .command-line-calculator svg path {
            fill: currentColor; /* Заставляет SVG использовать текущий цвет текста (зелёный/чёрный) */
        }

        /* УВЕЛИЧИВАЕМ РАЗМЕР ВСЕХ ФОРМУЛ MATHJAX ВНУТРИ ЛЕНТЫ КАЛЬКУЛЯТОРА */
        .command-line-calculator mjx-container {
            font-size: 100% !important; 
            
            margin: 4px 0 !important; 
            
            vertical-align: middle;
        }
        
        /* Заставляем все inline-формулы MathJax внутри калькулятора рендериться в крупном масштабе */
        .command-line-calculator mjx-container[inline] {
            font-size: 150% !important;
            margin: 4px 0 !important; 
        }

        /* Защита для мобильных телефонов: чтобы огромная дробь не вылезала за края карточки */
        @media (max-width: 768px) {
            .command-line-calculator mjx-container[inline] {
                font-size: 120% !important;
            }
        }

        /* Перекрашиваем глобальный заголовок в зелёный только внутри тёмного калькулятора */
        [data-theme="dark"] .command-line-calculator .step-heading,
        [data-theme="dark"] .step-heading {
            color: var(--calc-color-text) !important;
            transition: color 0.3s ease;
        }


        /* --- СТИЛИ ДЛЯ ПЛЕЙСХОЛДЕРА В ЗАВИСИМОСТИ ОТ ТЕМЫ --- */

        /* В светлой теме оставляем стандартный мягкий серый цвет */
        #calc-terminal-input::placeholder {
            color: #94a3b8;
            opacity: 1; /* Сбрасываем стандартную браузерную прозрачность во всех Firefox/Safari */
        }

        /* В тёмной теме делаем его читаемым тёмно-зелёным (чтобы отличался от яркого вводимого текста) */
        [data-theme="dark"] #calc-terminal-input::placeholder {
            color: #0aecac !important; /* Насыщенный изумрудно-зелёный */
            opacity: 1 !important;
        }

        /* Поддержка для старых версий браузеров на всякий случай */
        [data-theme="dark"] #calc-terminal-input::-webkit-input-placeholder { color: #0aecac !important; }
        [data-theme="dark"] #calc-terminal-input::-moz-placeholder          { color: #0aecac !important; }
        [data-theme="dark"] #calc-terminal-input:-ms-input-placeholder      { color: #0aecac !important; }      

        /* ПОЛУПРОЗРАЧНЫЙ ФОН (ОБЕРТКА) */
        #calc-settings-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.65); /* Полупрозрачный фон */
            backdrop-filter: blur(4px); /* Размытие за окном */
            z-index: 10000; /* Перекрывает FAB-меню */
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }

        #calc-settings-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* ТЕЛО МОДАЛЬНОГО ОКНА */
        #calc-settings-modal {
            background: var(--calc-bg-main);
            color: var(--calc-color-text);
            border: 1px solid var(--calc-color-border);
            width: 90%;
            max-width: 400px;
            border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            padding: 20px;
            box-sizing: border-box;
            transform: scale(0.9);
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        #calc-settings-overlay.active #calc-settings-modal {
            transform: scale(1);
        }

        /* Элементы шапки окна */
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--calc-color-border);
            padding-bottom: 12px;
            margin-bottom: 16px;
        }
        .modal-header h3 { margin: 0; font-size: 18px; font-weight: bold; }
        #calc-modal-close {
            background: transparent; border: none; 
            color: var(--calc-color-muted); font-size: 26px; cursor: pointer;
            line-height: 1;
        }
        #calc-modal-close:hover { color: var(--calc-color-danger); }

        /* Элементы формы внутри окна */
        .modal-form-group { margin-bottom: 18px; }
        .modal-form-group.inline-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .group-title { display: block; font-weight: bold; font-size: 14px; margin-bottom: 8px; }
        .form-help { display: block; font-size: 12px; color: var(--calc-color-echo); margin-top: 4px; }

        /* Кастомное поле ввода для точности (Up/Down) */
        #setting-precision {
            width: 70px;
            padding: 6px 8px;
            border-radius: 6px;
            border: 1px solid var(--calc-color-border);
            background: var(--calc-bg-card);
            color: var(--calc-color-text);
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            outline: none;
        }
        #setting-precision:focus {
            border-color: var(--calc-color-brand);
            box-shadow: 0 0 0 2px var(--calc-brand-shadow);
        }

        /* Контейнеры инпутов */
        .checkbox-container, .radio-container {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 14px;
            user-select: none;
        }
        .radio-tile-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 6px 0;
        }

        /* Современный цвет чекбоксов и радио-точек */
        #calc-settings-modal input[type="checkbox"],
        #calc-settings-modal input[type="radio"] {
            accent-color: var(--calc-color-brand);
            width: 16px;
            height: 16px;
        }

        /* ОБЩИЙ СТИЛЬ ДЛЯ ВЫПАДАЮЩИХ СПИСКОВ */
        .modal-select {
            width: 100%;
            padding: 10px 12px;
            border-radius: 6px;
            border: 1px solid var(--calc-color-border);
            background: var(--calc-bg-card);
            color: var(--calc-color-text);
            font-family: inherit;
            font-size: 14px;
            outline: none;
            cursor: pointer;
            box-sizing: border-box;
            appearance: none; /* Убираем дефолтную стрелочку браузера для кастомизации */
            background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px;
            padding-right: 40px; /* Отступ справа, чтобы текст не налезал на стрелочку */
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        /* Эффект фокуса на селекте */
        .modal-select:focus {
            border-color: var(--calc-color-brand);
            box-shadow: 0 0 0 2px var(--calc-brand-shadow);
        }

        /* Перекрашиваем выпадающие элементы (options) для темной темы */
        .modal-select option {
            background: var(--calc-bg-main);
            color: var(--calc-color-text);
        }

        /* Динамическая смена цвета стрелочки в выпадающем списке для темной темы */
        [data-theme="dark"] .modal-select {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%2339ff14' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
        }        
    </style>
</head>

<body class="tex2jax_process">

    <div class="wrapper">
		<!-- Контейнер интерактивной командной ленты калькулятора -->
		<div class="command-line-calculator">
			
			<!-- Зона истории: сюда JS будет динамически добавлять выполненные карточки -->
			<div id="calc-history-stream"></div>

			<!-- Активный блок ввода (всегда зафиксирован в самом внизу ленты) -->
			<div class="active-input-block">
				<div class="step-heading">Новое математическое выражение или команда print():</div>

                <div class="input-row-container">
                    <!-- Единый монолитный блок терминала -->
                    <div class="terminal-editor-block">
                        
                        <!-- Рабочая зона: Номера строк + Ввод -->
                        <div class="textarea-with-lines">
                            <div id="calc-line-numbers" class="line-numbers"><div>1</div></div>
                            <textarea id="calc-terminal-input" rows="2" placeholder="Например: z = 3 + 4i; или print(&quot;Ответ:&quot;, z^2)"></textarea>
                        </div>

                        <!-- ФИКСИРОВАННАЯ ПАНЕЛЬ СТАТУСА (Status Bar) -->
                        <div class="terminal-status-bar">
                            <!-- Кнопка запуска слева (теперь она аккуратная и встроенная) -->
                            <button id="calc-submit-btn" title="Запустить код (Ctrl+Enter)">▶ Выполнить</button>
                            
                            <!-- Индикатор положения курсора справа -->
                            <div id="calc-cursor-position" class="cursor-position">Стр 1, Кол 1</div>
                        </div>

                    </div>
                </div>

			</div>
		</div>	
	</div>

    <!-- Контейнер группы кнопок по вашему стилю -->
    <div class="fab-container" id="calc-fab-container">
        
        <!-- Главная управляющая круглая кнопка (Шестеренка) -->
        <button class="fab-main" id="calc-fab-main" title="Настройки калькулятора">⚙️</button>
        
        <!-- Блок с дочерними кнопками для смены тем -->
        <div class="fab-subs">
            <!-- Кнопка включения Светлой темы -->
            <button class="fab-btn theme-toggle-btn" data-set-theme="light" data-tooltip="Светлая тема">☀️</button>
            
            <!-- Кнопка включения Тёмной темы -->
            <button class="fab-btn theme-toggle-btn" data-set-theme="dark" data-tooltip="Тёмная тема">🌙</button>

            <!-- Открывает модальное окно настроек математики -->
            <button class="fab-btn" id="calc-open-settings-modal" data-tooltip="Параметры сессии">🛠️</button>
        </div>        
    </div>

    <!-- Модальное окно математических настроек -->
    <div id="calc-settings-overlay">
        <div id="calc-settings-modal">
            <div class="modal-header">
                <h3>Параметры сессии</h3>
                <button id="calc-modal-close">&times;</button>
            </div>
            
            <div class="modal-body">
                <!-- 1. Формат комплексных чисел (Выпадающий список) -->
                <div class="modal-form-group">
                    <label for="setting-complex-format" class="group-title">Формат комплексных чисел:</label>
                    <select id="setting-complex-format" class="modal-select">
                        <option value="0">Алгебраическая форма (a + jb)</option>
                        <option value="1">Полярная форма (M ∠ θ)</option>
                        <option value="2">Экспоненциальная форма (M * e^(jθ))</option>
                    </select>
                    <small class="form-help" id="complex-help">Действительная и мнимая части через j (электротехника).</small>
                </div>

                <!-- 2. Режимы измерения углов (Выпадающий список) -->
                <div class="modal-form-group">
                    <label for="setting-angle-mode" class="group-title">Измерение и рендеринг углов (θ):</label>
                    <select id="setting-angle-mode" class="modal-select">
                        <option value="0">Радианы (стандартное число)</option>
                        <option value="1">Градусы (0° – 360° / -180° – 180°)</option>
                        <option value="2">Грады (метрические углы, прямой угол = 100g)</option>
                        <option value="3">Обороты (доли круга от 0 до 1)</option>
                        <option value="4">Аналитический режим (дробь с π, например 2*π/3)</option>
                    </select>
                    <small class="form-help" id="angle-help">Определяет расчет и вывод аргумента комплексного числа.</small>
                </div>

                <!-- 3. Точность вывода (Остается без изменений, в одну строку) -->
                <div class="modal-form-group inline-group">
                    <label for="setting-precision" class="group-title">Знаков после запятой:</label>
                    <input type="number" id="setting-precision" min="0" max="20" step="1" value="4">
                </div>
            </div>
        </div>
    </div>

	<script type="module">

        import { MathParser } from './js/math_parser/MathParser.js';
        import { COMPLEX_FORMAT, ANGLE_MODE } from './js/math_parser/ConstantsDef.js';
        import { SymbolTableContext } from './js/math_parser/SymbolTableContext.js';
        import { createFloatingWindowDOM } from './js/util.js';
        
        // Единая изолированная область памяти (контекст сессии калькулятора)
        // Переменные живут здесь, пока пользователь не обновит страницу
        const globalScope = new SymbolTableContext();
        
        const terminalInput = document.getElementById('calc-terminal-input');

        if (terminalInput) {
            // Функция автоматического изменения высоты
            const adjustHeight = () => {
                //terminalInput.style.height = 'auto'; // Сбрасываем высоту для корректного перерасчета
                terminalInput.style.height = '0px';
                terminalInput.style.height = `${terminalInput.scrollHeight}px`; // Задаем высоту по контенту

                // автоматически удерживаем вводимую строку в поле зрения
                if (document.activeElement === terminalInput) {
                    const activeBlock = document.querySelector(".active-input-block") || terminalInput;
                    activeBlock.scrollIntoView({
                        behavior: 'smooth', // Плавная прокрутка экрана
                        block: 'nearest',    // Прокрутит ровно настолько, чтобы поле полностью влезло в экран
                        inline: 'nearest'
                    });
                }                
            };

            terminalInput.addEventListener('focus', adjustHeight);

            // Слушаем ввод текста (работает при Enter, Backspace, Ctrl+V и т.д.)
            terminalInput.addEventListener('input', adjustHeight);

            if (window.ResizeObserver) {
                new ResizeObserver(adjustHeight).observe(terminalInput);
            } else {
                // Запасной вариант для совсем древних браузеров
                window.addEventListener('resize', adjustHeight);
            }

            // Первичный расчет (на случай, если в поле уже есть текст при загрузке страницы)
            adjustHeight();
        }

        document.addEventListener("DOMContentLoaded", () => {
            const inputArea = document.getElementById("calc-terminal-input");
            const submitBtn = document.getElementById("calc-submit-btn");
            const historyStream = document.getElementById("calc-history-stream");

            if (!inputArea || !submitBtn || !historyStream) {
                console.error("[Calculator UI]: Не удалось найти критические элементы интерфейса на странице.");
                return;
            }

            // Главная функция обработки введенной команды
            function executeCurrentCommand() {
                const rawCode = inputArea.value.trim();
                if (!rawCode) return; // Игнорируем пустой ввод

                // 1. Создаем контейнер для новой карточки в ленте истории
                const card = document.createElement("div");
                card.className = "calc-card";

                // НОВОЕ: Создаем единый контейнер для кнопок управления в углу
                const actionsContainer = document.createElement("div");
                actionsContainer.className = "calc-card-actions";

                // 2. Добавляем кнопку удаления этой карточки [×]
                const deleteBtn = document.createElement("button");
                deleteBtn.className = "calc-card-delete";
                deleteBtn.innerHTML = "&times;";
                deleteBtn.title = "Удалить этот расчет";
                deleteBtn.onclick = () => card.remove();

                // 3. Добавляем кнопку сворачивания эхо-кода [👁️]
                const toggleEchoBtn = document.createElement("button");
                toggleEchoBtn.className = "calc-card-toggle-echo";
                toggleEchoBtn.innerHTML = "👁️";
                toggleEchoBtn.title = "Скрыть/Показать исходный код";

                const echoBlock = document.createElement("div");
                echoBlock.className = "calc-card-echo";
                echoBlock.textContent = rawCode;

                toggleEchoBtn.onclick = () => {
                    const isHidden = echoBlock.classList.toggle("hidden");
                    toggleEchoBtn.innerHTML = isHidden ? "🙈" : "👁️";
                    toggleEchoBtn.title = isHidden ? "Показать исходный код" : "Скрыть исходный код";
                };

                // Сначала складываем кнопки в контейнер действий
                actionsContainer.appendChild(toggleEchoBtn);
                actionsContainer.appendChild(deleteBtn);

                // Затем сам контейнер действий добавляем в карточку
                card.appendChild(actionsContainer);

                // 4. Выводим «эхо» и результат
                card.appendChild(echoBlock);
                const resultBlock = document.createElement("div");
                resultBlock.className = "result-side";
                card.appendChild(resultBlock);                

                try {
                    // Запускаем наш потоковый LL(1) компилятор
                    const parser = new MathParser(rawCode, globalScope);
                    parser.parse();

                    // Проверяем наличие ошибок лексики или синтаксиса
                    if (parser.errors.length > 0) {
                        card.classList.add("error-row"); // Подсвечиваем карточку красным цветом ваших стилей
                        
                        let errorHTML = "<strong>Ошибка разбора выражения:</strong><br>";
                        parser.errors.forEach(err => {
                            errorHTML += `${err.toString()}<br>`;
                        });
                        resultBlock.innerHTML = errorHTML;
                    } else {
                        // Очищаем блок перед выводом (чтобы не дублировать результаты при повторных кликах)
                        resultBlock.innerHTML = "";

                        const parseResult = parser.toTex();

                        parseResult.forEach((res) => {
                            switch (res.type)
                            {
                                case 'mixed': {
                                    const printRow = document.createElement("div");
                                    printRow.className = "print-row"; 
                                    printRow.innerHTML = res.value; 
                                    resultBlock.appendChild(printRow);
                                    }
                                    break;
                                case 'expr': {
                                    const mathRow = document.createElement("div");
                                    mathRow.className = "output-row";
                                    mathRow.innerHTML = res.value;
                                    resultBlock.appendChild(mathRow);
                                    }
                                    break;
                                case 'plot':
                                    if (res.value.target === "window") {
                                        createFloatingWindowDOM(res.value.id);
                                    } else if (res.value.target === "inline") {
                                        const mathRow = document.createElement("div");
                                        mathRow.className = "output-row";
                                        res.value.containerElement = mathRow;
                                        //res.value.instance = new VectorDiagram(mathRow, res.value.data); 
                                        resultBlock.appendChild(mathRow);
                                    }
                                    break;
                            }
                        });
                        // Если цикл прошёл, но в resultBlock ничего не добавилось (все строки были скрыты через $)
                        if (resultBlock.children.length === 0) {
                            const silentRow = document.createElement("div");
                            silentRow.style.color = "#6c757d";
                            silentRow.style.fontStyle = "italic";
                            silentRow.textContent = "Вычислено (сохранено в памяти $)";
                            resultBlock.appendChild(silentRow);
                        }
                    }

                } catch (runtimeError) {
                    // Перехватываем математические ошибки (например, деление на ноль или отсутствие переменной)
                    card.classList.add("error-row");
                    resultBlock.innerHTML = `<strong>Критическая ошибка вычисления:</strong><br>${runtimeError.message}`;
                    console.error(runtimeError);
                }

                // 5. Вставляем готовую карточку в ленту истории
                historyStream.appendChild(card);

                // 6. Очищаем поле ввода и возвращаем на него фокус для следующей команды
                inputArea.value = "";
                // СБРОС ВЫСОТЫ: возвращаем textarea к начальному размеру в одну строку
                inputArea.style.height = 'auto'; 
                inputArea.focus();

                // Внутренняя функция для идеального скролла
                const performSmartScroll = () => {
                    const activeBlock = document.querySelector(".active-input-block") || inputArea;
                    if (activeBlock) {
                        activeBlock.scrollIntoView({ 
                            behavior: 'smooth', 
                            block: 'end' 
                        });
                    }
                };

                // 8. Запускаем рендеринг MathJax и строго ПОСЛЕ его завершения крутим экран
                if (window.MathJax && typeof window.MathJax.typesetPromise === 'function') {
                    window.MathJax.typesetPromise([resultBlock])
                        .then(() => {
                            // Формулы отрисованы, высота карточки финальная. 
                            // Делаем микро-задержку, чтобы мобильная клавиатура успела занять свое место
                            setTimeout(performSmartScroll, 80);
                        })
                        .catch((mjErr) => {
                            console.error("[Calculator UI] Ошибка рендеринга MathJax:", mjErr);
                            // Даже если MathJax упал, все равно скроллим
                            setTimeout(performSmartScroll, 30);
                        });
                } else {
                    // Если MathJax не загружен, скроллим с минимальной задержкой
                    setTimeout(performSmartScroll, 50);
                }
            }

            // Слушатель клика по кнопке Enter
            submitBtn.addEventListener("click", executeCurrentCommand);

            // Слушатель горячих клавиш: Ctrl+Enter или Cmd+Enter для удобства работы на компьютерах
            inputArea.addEventListener("keydown", (event) => {
                if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
                    event.preventDefault(); // Предотвращаем стандартный перенос строки в textarea
                    executeCurrentCommand();
                }
            });

            const fabContainer = document.getElementById("calc-fab-container");
            const fabMain = document.getElementById("calc-fab-main");
            const themeButtons = document.querySelectorAll(".theme-toggle-btn");
            
            // Элементы модального окна
            const openModalBtn = document.getElementById("calc-open-settings-modal");
            const closeModalBtn = document.getElementById("calc-modal-close");
            const overlay = document.getElementById("calc-settings-overlay");
            

            // --- 1. УПРАВЛЕНИЕ FAB-МЕНЮ (Ваша логика) ---
            fabMain.addEventListener("click", (e) => {
                e.stopPropagation();
                fabContainer.classList.toggle("open");
            });

            document.addEventListener("click", () => {
                fabContainer.classList.remove("open");
            });

            // --- 2. УПРАВЛЕНИЕ ТЕМАМИ (☀️ / 🌙) ---
            const setTheme = (themeName) => {
                document.documentElement.setAttribute("data-theme", themeName);
                localStorage.setItem("calc-theme", themeName);

                themeButtons.forEach(btn => {
                    if (btn.getAttribute("data-set-theme") === themeName) {
                        btn.style.borderColor = "#2196F3"; 
                        btn.style.backgroundColor = "#e3f2fd";
                    } else {
                        btn.style.borderColor = "#ccc"; 
                        btn.style.backgroundColor = "#ffffff";
                    }
                });
            };

            themeButtons.forEach(button => {
                button.addEventListener("click", (e) => {
                    e.stopPropagation();
                    const theme = button.getAttribute("data-set-theme");
                    setTheme(theme);
                    fabContainer.classList.remove("open"); // Закрываем меню
                });
            });

            // Инициализация темы при загрузке страницы
            const savedTheme = localStorage.getItem("calc-theme") || "light";
            setTheme(savedTheme);

            const selectComplex = document.getElementById("setting-complex-format");
            const selectAngle = document.getElementById("setting-angle-mode");
            const numPrecision = document.getElementById("setting-precision");

            // Блоки текстовых подсказок под списками
            const complexHelp = document.getElementById("complex-help");
            const angleHelp = document.getElementById("angle-help");

            // Словари динамических подсказок для удобства инженера
            const complexHints = {
                0: "Стандартный режим (a + jb). Сумма действительной и мнимой частей.",
                1: "Геометрический режим (M ∠ θ). Представление в виде векторов (амплитуда и угол).",
                2: "Экспоненциальная форма (M * e^(jθ)). Идеально для цепей переменного тока."
            };

            const angleHints = {
                0: "Классические радианы. Вывод угла в виде стандартной дроби (например, 2.0944).",
                1: "Инженерный режим. Понятное представление угла в градусах от 0° до 360°.",
                2: "Метрические углы. Используются в геодезии и навигации (прямой угол = 100g).",
                3: "Доли круга от 0 до 1. Удобно для расчета частот вращения валов.",
                4: "Аналитический вывод. Авто-перевод хвоста в красивую дробь с числом π (2*π/3)."
            };

            // --- ОТКРЫТИЕ ОКНА И СИНХРОНИЗАЦИЯ С СЕССИЕЙ ---
            openModalBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                
                // Читаем текущие числовые значения из globalScope.settings и выставляем их в форму
                selectComplex.value = globalScope.settings.complexFormat;
                selectAngle.value = globalScope.settings.angleMode;
                numPrecision.value = globalScope.settings.precision;

                // Инициализируем правильный текст подсказок при открытии
                complexHelp.textContent = complexHints[globalScope.settings.complexFormat];
                angleHelp.textContent = angleHints[globalScope.settings.angleMode];

                overlay.classList.add("active");
            });

            // Закрытие окна
            const closeModal = () => { overlay.classList.remove("active"); };
            closeModalBtn.addEventListener("click", closeModal);
            overlay.addEventListener("click", (e) => { if (e.target === overlay) closeModal(); });

            // --- ЗАПИСЬ НАСТРОЕК В ПАМЯТЬ ПРИ ИЗМЕНЕНИИ ---

            // Смена формата комплексных чисел
            selectComplex.addEventListener("change", () => {
                const value = parseInt(selectComplex.value);
                globalScope.settings.complexFormat = value;
                complexHelp.textContent = complexHints[value]; // Обновляем подсказку на лету
            });

            // Смена режима измерения углов
            selectAngle.addEventListener("change", () => {
                const value = parseInt(selectAngle.value);
                globalScope.settings.angleMode = value;
                angleHelp.textContent = angleHints[value]; // Обновляем подсказку на лету
            });

            // Изменение точности (Number input Up/Down)
            numPrecision.addEventListener("input", () => {
                let val = parseInt(numPrecision.value);
                if (isNaN(val) || val < 0) val = 0;
                if (val > 20) val = 20;
                
                numPrecision.value = val;
                globalScope.settings.precision = val;
            });

            numPrecision.addEventListener("keypress", (e) => {
                if (e.key === "." || e.key === "," || e.key === "-") {
                    e.preventDefault();
                }
            });
            
            const textarea = document.getElementById('calc-terminal-input');
            const lineNumbersEle = document.getElementById('calc-line-numbers');
            const cursorIndicator = document.getElementById('calc-cursor-position');

            if (!textarea || !lineNumbersEle) return;

            // --- [СОЗДАНИЕ ЗЕРКАЛА ДЛЯ РАСЧЕТА СТРОК — БЕЗ ИЗМЕНЕНИЙ] ---
            const mirrorEle = document.createElement('div');
            const textareaStyle = window.getComputedStyle(textarea);
            mirrorEle.style.position = 'absolute';
            mirrorEle.style.visibility = 'hidden';
            mirrorEle.style.whiteSpace = textareaStyle.whiteSpace;
            mirrorEle.style.wordBreak = textareaStyle.wordBreak;
            mirrorEle.style.fontFamily = textareaStyle.fontFamily;
            mirrorEle.style.fontSize = textareaStyle.fontSize;
            mirrorEle.style.lineHeight = textareaStyle.lineHeight;
            mirrorEle.style.padding = textareaStyle.padding;
            mirrorEle.style.boxSizing = textareaStyle.boxSizing;
            document.body.appendChild(mirrorEle);

            const updateLineNumbers = () => {
                mirrorEle.style.width = `${textarea.clientWidth}px`;
                const text = textarea.value;
                const lines = text.split('\n');
                mirrorEle.innerHTML = '';
                
                lines.forEach((line) => {
                    const span = document.createElement('span');
                    span.style.display = 'block';
                    span.textContent = line === '' ? ' ' : line;
                    mirrorEle.appendChild(span);
                });

                const spans = mirrorEle.querySelectorAll('span');
                let lineNumbersHtml = '';
                const lineHeight = parseFloat(textareaStyle.lineHeight) || 22.5;

                spans.forEach((span, index) => {
                    const spanHeight = span.getBoundingClientRect().height;
                    const subLinesCount = Math.max(1, Math.round(spanHeight / lineHeight));
                    lineNumbersHtml += `<div>${index + 1}</div>`;
                    for (let i = 1; i < subLinesCount; i++) {
                        lineNumbersHtml += `<div>&nbsp;</div>`;
                    }
                });
                lineNumbersEle.innerHTML = lineNumbersHtml;
            };

            const updateCursorPosition = () => {
                const selectionStart = textarea.selectionStart;
                const text = textarea.value;
                const textBeforeCursor = text.substring(0, selectionStart);
                const lines = textBeforeCursor.split('\n');
                const currentLine = lines.length;
                const currentColumn = lines[lines.length - 1].length + 1;

                if (cursorIndicator) {
                    cursorIndicator.textContent = `Стр ${currentLine}, Кол ${currentColumn}`;
                }
            };

            // --- РЕШЕНИЕ НЮАНСА: АВТО-ПЕРЕХВАТЧИК ОЧИСТКИ ИЗ JS-КОДА ---
            // Переопределяем стандартный дескриптор свойства value для этого конкретного textarea
            const rawPrototype = Object.getPrototypeOf(textarea);
            const valueDescriptor = Object.getOwnPropertyDescriptor(rawPrototype, 'value');

            Object.defineProperty(textarea, 'value', {
                get() {
                    return valueDescriptor.get.call(this);
                },
                set(newValue) {
                    valueDescriptor.set.call(this, newValue); // Записываем текст как обычно
                    // Автоматически дергаем обновление интерфейса, так как это было сделано из JS
                    updateLineNumbers();
                    updateCursorPosition();
                },
                configurable: true
            });

            // Стандартные слушатели для действий пользователя
            textarea.addEventListener('input', () => {
                updateLineNumbers();
                updateCursorPosition();
            });
            textarea.addEventListener('keyup', updateCursorPosition);
            textarea.addEventListener('click', updateCursorPosition);
            textarea.addEventListener('focus', updateCursorPosition);

            if (window.ResizeObserver) {
                new ResizeObserver(updateLineNumbers).observe(textarea);
            }

            updateLineNumbers();
            updateCursorPosition();

        });  // addEventListener("DOMContentLoaded"
	</script>
</body>
</html>
