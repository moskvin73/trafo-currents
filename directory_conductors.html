<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ГОСТ 22483 — Справочник жил</title>

    <link rel="stylesheet" href="./css/main-page.css">
    <link rel="stylesheet" href="./css/editable-table.css">
   
    <!-- Загрузка библиотеки Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Загрузка файла конфигурации Supabase -->
    <script src="./js/supabase-config.js"></script>

    <!-- Старая конфигурация к googl таблицам -->
    <script src="./js/config.js"></script>

     <!-- Подключение MathJax для рендеринга формул -->
    <script src="./js/math-script.js"></script>
   
    <style>

        /* Кнопки действий (💾 и 🗑️) */
        .project-table .btn-ghost {
            height: 19px !important;        
            line-height: 17px !important;   
            padding: 0 5px !important;
            margin: 0 1px !important;
            font-size: 11px !important;     
            background-color: #ffffff !important;
            border: 1px solid rgba(0, 0, 0, 0.1) !important;
            border-radius: 3px !important;
        }
        .project-table .btn-ghost:hover {
            background-color: #f8fafc !important;
            border-color: rgba(0, 0, 0, 0.2) !important;
        }


        /* ==========================================================================
        ВСПОМОГАТЕЛЬНЫЕ СТИЛИ
        ========================================================================== */

        /* Выделение строки создания новой записи */
        .project-table .new-row-highlight td {
            background-color: #f0fdf4 !important; 
        }

    </style>
</head>
<body>

    <header>
        <div>
            <h1>Инженерный комплекс ТКЗ</h1>
            <p>Справочник параметров токопроводящих жил (ГОСТ 22483—2012)</p>
        </div>
        <div>
            <a href="index.html" class="btn btn-ghost" style="padding: 8px 16px;">⬅️ На главную</a>
        </div>
    </header>

    <div class="panel" style="max-width: 1100px; margin: 20px auto;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin: 0; border: none; padding: 0;">📋 Реестр сечений и материалов жилы</h2>
            <!-- Админ видит кнопку добавления строки прямо в таблицу -->
            <button id="adminAddRowBtn" class="btn" style="display: none;" onclick="addNewRowToTable()">+ Добавить новую строку</button>
        </div>

        <div class="table-container-fixed">
            <table class="project-table" style="width: 100%;">
            <thead>
                <tr>
                    <th style="width: 60px;">№</th> <!-- Вместо ID пишем просто порядковый номер -->
                    <th>Материал жилы</th>
                    <th>Сечение,<br>мм²</th>
                    <th>Класс гибкости</th>
                    <th>Сопротивление $R_{20}$,<br>Ом/км</th>
                    <th id="thAdminAction" style="display: none; width: 120px; text-align: center;">Действие</th>
                </tr>
            </thead>
            <tbody id="directoryTableBody">
                <tr>
                    <td colspan="6" style="text-align: center; color: var(--text-muted);">
                        <div style="display: flex; align-items: center; gap: 10px; padding-left: 15px; font-size: 14px; font-weight: bold; color: #475569;">
                            <div class="spinner-loader"></div>
                            <div>Загрузка данных из облака Google...</div>
                        </div>
                    </td>
                </tr>
            </tbody>
            </table>
        </div>
    </div>

    <script>

        const userRole = localStorage.getItem('user_role') || 'guest';
        //let userRole = 'guest'; 
        // 2. Запускаем скрытый фоновый запрос к Supabase
        /*window.getCurrentUserRole().then(role => {
            userRole = role; // Когда ответ придет, переменная обновится
            
            // Сюда можно перенести вызов отрисовки вашей страницы, 
            // чтобы формы переключились ровно в тот момент, когда роль получена:
            console.log("Роль успешно получена из базы:", userRole);
        });*/

        let currentConductors = []; // Храним загруженные данные в памяти
        // Получаем клиента
        const supabaseClient = window.getSupabaseClient();
        // Вспомогательная функция для создания паузы между попытками (в миллисекундах)
        const delay = ms => new Promise(resolve => setTimeout(resolve, ms));

        document.addEventListener("DOMContentLoaded", () => {
            if (userRole === 'admin') {
                document.getElementById('adminAddRowBtn').style.display = 'inline-flex';
                document.getElementById('thAdminAction').style.display = 'table-cell';
            }
            initPage();
        });

        async function initPage() {
        try {
            // 1. Сначала проверяем кэш браузера (как мы делали раньше)
            /*const cachedData = localStorage.getItem('gost_table_cache');
            if (cachedData) {
                console.log('Данные мгновенно взяты из кэша браузера!');
                currentConductors = JSON.parse(cachedData);
                renderTable();
                return;
            }*/

            // 2. Если кэша нет, запускаем наше чтение с 3 попытками
            const data = await fetchGostDataWithRetry();
            
            // 3. Сохраняем в кэш и отрисовываем
            //localStorage.setItem('gost_table_cache', JSON.stringify(data));
            currentConductors = data;
            renderTable();

        } catch (err) {
            console.error('Критическая ошибка:', err.message);
            alert('Произошла ошибка при загрузке справочника. Пожалуйста, обновите страницу позже.');
        }
        }        

        // Загрузка данных
        async function fetchGostDataWithRetry() {
            const tableBody = document.getElementById('directoryTableBody');
         
            const maxAttempts = 3;     // Максимальное количество попыток
            let currentAttempt = 1;    // Текущая попытка

            while (currentAttempt <= maxAttempts) {
                try {
                    console.log(`Попытка чтения данных #${currentAttempt}...`);
                    
                    const { data, error } = await supabaseClient
                        .from('gost_22483_conductors')
                        .select('*')
                        .order('id', { ascending: true });

                    // Если база вернула ошибку, бросаем её в блок catch
                    if (error) throw error;

                    // Если данные успешно получены, выходим из цикла и возвращаем их
                    console.log(`Успех на попытке #${currentAttempt}! Данные ГОСТ получены.`);
                    return data; 

                    } catch (err) {
                    console.warn(`Попытка #${currentAttempt} завершилась неудачей:`, err.message);
                    
                    // Если это была последняя попытка, то прекращаем и пробрасываем ошибку дальше
                    if (currentAttempt === maxAttempts) {
                        throw new Error(`Не удалось загрузить данные после ${maxAttempts} попыток. Сервер недоступен.`);
                    }
                    
                    // Перед следующей попыткой делаем паузу 2 секунды (2000 мс), чтобы дать базе время проснуться
                    console.log('Ожидание перед следующей попыткой...');
                    await delay(2000); 
                    
                    currentAttempt++; // Переходим к следующей попытке
                }
            }
            /*fetch(`${AppConfig.GOOGLE_WEB_APP_URL}?action=get_conductors`)
            .then(response => {
                if (!response.ok) throw new Error("Ошибка связи со справочником");
                return response.json();
            })
            .then(res => {
                if (res.success) {
                    currentConductors = res.data;
                    renderTable();
                } else {
                    tableBody.innerHTML = `<tr><td colspan="6" style="color:#dc2626;">Ошибка базы: ${res.error}</td></tr>`;
                }
            })
            .catch(error => {
                console.error("Catalog Loading Error:", error);
                tableBody.innerHTML = `<tr><td colspan="6" style="color:#dc2626;">Не удалось загрузить данные ГОСТ. Проверьте сеть.</td></tr>`;
            });*/
        }

        // Отрисовка таблицы в зависимости от роли
        function renderTable() {
            const tableBody = document.getElementById('directoryTableBody');
            tableBody.innerHTML = "";

            currentConductors.forEach((row, index) => {
                const tr = document.createElement('tr');
                tr.setAttribute('data-id', row.id); // Прячем системный ID в атрибут строки

                if (userRole === 'admin') {
                    // ИНТЕРФЕЙС АДМИНИСТРАТОРА: Поля ввода и выпадающие списки
                    tr.innerHTML = `
                        <td>
                            ${index + 1}
                            <span class="sub-text">id: ${row.id}</span>
                        </td>
                        <td>
                            <select class="table-select" style="text-align: left !important;" id="type_${row.id}">
                                <option value="0" ${row.conductor_type === 0 ? 'selected' : ''}>Медь (голая)</option>
                                <option value="1" ${row.conductor_type === 1 ? 'selected' : ''}>Медь (с покрытием)</option>
                                <option value="2" ${row.conductor_type === 2 ? 'selected' : ''}>Алюминий</option>
                            </select>
                        </td>
                        <td><input type="number" step="0.01" class="table-input" id="section_${row.id}" value="${row.cross_section.toFixed(2)}"></td>
                        <td><input type="number" step="1" min="1" max="6" class="table-input" id="class_${row.id}" value="${row.class}"></td>
                        <td><input type="text" 
                            class="table-input" 
                            style="font-family:monospace;"
                            inputmode="decimal"
                            onfocus="this.oldValue = this.value;"
                            oninput="if(Number(this.value) <= 0 && this.value.length > 0) { this.value = this.oldValue; } else { this.oldValue = this.value; }"
                            id="res_${row.id}" 
                            value="${row.resistance.toFixed(4)}" 
                            onchange="if(this.value.length > 0) this.value = Number(this.value).toFixed(4);"></td>
                        <td>
                            <button class="btn btn-ghost" style="padding: 4px 8px; color: #16a34a; border-color: #bbf7d0;" onclick="saveRowChange(${row.id})" title="Сохранить">💾</button>
                            <button class="btn btn-ghost" style="padding: 4px 8px; color: #dc2626; border-color: #fca5a5;" onclick="deleteRow(${row.id})" title="Удалить">🗑️</button>
                        </td>
                    `;
                } else {
                    // ИНТЕРФЕЙС ИНЖЕНЕРА / ГОСТЯ: Чистый текст (Read Only)

                    let materialText = "";
                    if (row.conductor_type === 0) materialText = "🔴 Медь (голая)";
                    else if (row.conductor_type === 1) materialText = "🟤 Медь (с покрытием)";
                    else if (row.conductor_type === 2) materialText = "⚪ Алюминий";
                    else materialText = "❓ Неизвестно";                    

                    tr.innerHTML = `
                        <td>${index + 1}</td>
                        <td><strong>${materialText}</strong></td>
                        <td>${row.cross_section.toFixed(2)} мм²</td>
                        <td>Класс ${row.class}</td>
                        <td style="font-family: monospace;">${row.resistance.toFixed(4)}</td>
                    `;
                }
                tableBody.appendChild(tr);
            });
        }

        // Логика добавления новой пустой строки прямо в таблицу (для админа)
        function addNewRowToTable() {
            const tableBody = document.getElementById('directoryTableBody');
            
            // Если администратор уже нажал кнопку и пустая строка ввода уже открыта сверху — не плодим дубликаты
            if (document.getElementById('type_new_row')) {
                // Дополнительно: если строка уже есть, просто докрутим до неё
                document.getElementById('type_new_row').scrollIntoView({ behavior: 'smooth', block: 'center' });
                return;
            }

            const tempId = "new_row"; 

            const tr = document.createElement('tr');
            tr.setAttribute('data-id', tempId);
            tr.id = "inserted_new_row_element"; // Добавляем временный id для поиска элемента скроллером
            tr.className = "new-row-highlight"; // Подсвечиваем зеленым для наглядности
            
            tr.innerHTML = `
                <td>* <span class="sub-text">новый</span></td>
                <td>
                    <select class="table-select" id="type_${tempId}">
                        <option value="0">Медь (голая)</option>
                        <option value="1">Медь (с покрытием)</option>
                        <option value="2">Алюминий</option>
                    </select>
                </td>
                <td><input type="number" step="0.01" class="table-input" id="section_${tempId}" placeholder="0.00"></td>
                <td><input type="number" class="table-input" id="class_${tempId}" value="1"></td>
                <td><input type="text" class="table-input" style="font-family:monospace;" id="res_${tempId}" placeholder="0.0000"></td>
                <td>
                    <button class="btn btn-ghost" style="padding: 4px 8px; color: #16a34a; border-color: #bbf7d0;" onclick="saveRowChange('${tempId}')">💾</button>
                    <button class="btn btn-ghost" style="padding: 4px 8px; color: #475569;" onclick="renderTable()">❌</button>
                </td>
            `;
            
            // Вставляем элемент в самое начало tbody
            tableBody.prepend(tr);

            // АВТОМАТИЧЕСКИЙ СКРОЛЛИНГ: плавно перемещаем экран к созданной строке
            // Метод scrollIntoView с флагом behavior: 'smooth' обеспечивает приятную гладкую анимацию прокрутки
            tr.scrollIntoView({ behavior: 'smooth', block: 'center' });
            
            // Дополнительно ставим фокус на первый элемент ввода (выбор материала), чтобы админ мог сразу нажать Enter/стрелочки
            setTimeout(() => {
                const firstInput = document.getElementById(`type_${tempId}`);
                if(firstInput) firstInput.focus();
            }, 300);
        }

        // Сбор данных из строки и отправка в Apps Script через POST
        function saveRowChange(id) {
            const type = document.getElementById(`type_${id}`).value;
            const section = parseFloat(document.getElementById(`section_${id}`).value);
            const cls = parseInt(document.getElementById(`class_${id}`).value);
            const res = parseFloat(document.getElementById(`res_${id}`).value);

            if (isNaN(section) || isNaN(cls) || isNaN(res)) {
                return alert("Ошибка: Проверьте правильность заполнения всех числовых полей!");
            }

            // Если ID временный (начинается на new_), шлем на сервер null для создания записи
            const isNew = String(id).startsWith('new_');

            fetch(AppConfig.GOOGLE_WEB_APP_URL, {
                method: "POST",
                mode: "cors",
                redirect: "follow",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({
                    action: "save_gost_conductor",
                    id: isNew ? null : Number(id),
                    server_auth_login: localStorage.getItem('user_login'),
                    conductor_type: parseInt(type),
                    cross_section: section,
                    class: cls,
                    resistance: res
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert(data.message);
                    loadConductorsData(); // Полностью перегружаем актуальные данные с сервера
                } else {
                    alert("Ошибка сохранения: " + data.error);
                }
            })
            .catch(error => {
                console.error("Save Error:", error);
                alert("Сетевая ошибка при попытке сохранить изменения.");
            });
        }

        function deleteRow(id) {
            if (!confirm(`Вы уверены, что хотите безвозвратно удалить эту жилу из справочника ГОСТ?`)) return;

            fetch(AppConfig.GOOGLE_WEB_APP_URL, {
                method: "POST",
                mode: "cors",
                redirect: "follow",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({
                    action: "delete_gost_conductor",
                    server_auth_login: localStorage.getItem('user_login'),
                    id: Number(id)
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert(data.message);
                    loadConductorsData(); // Обновляем таблицу на экране
                } else {
                    alert("Ошибка удаления: " + data.error);
                }
            })
            .catch(error => {
                console.error("Delete Error:", error);
                alert("Сетевая ошибка при попытке удаления.");
            });
        }
    </script>
</body>
</html>
